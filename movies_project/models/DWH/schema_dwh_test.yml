version: 2
models:
  - name: dim_movies
    columns:
      - name: movie_id
        data_tests:
          - unique
          - not_null
      - name: title
        data_tests:
          - not_null
      - name: release_year
        data_tests:
          - not_null
      - name: director
        data_tests:
          - not_null
      - name: language
        data_tests:
          - not_null
      - name: production_company
        description: "The production company of the movie. Nullable — not available for all movies."
      - name: awards
        description: "The awards won by the movie. Nullable — not all movies have award data recorded." 
      - name: rt_url
        description: "The URL of the movie's page on Rotten Tomatoes. Nullable — not all movies are listed on Rotten Tomatoes."
      - name: custom_score
        data_tests:
          - not_null
      - name: plot
        data_tests:
          - not_null

  - name: dim_genres
    columns:
      - name: genre_id
        data_tests:
          - unique
          - not_null
      - name: genre
        data_tests:
          - not_null

  - name: dim_platforms
    columns:
      - name: platform_id
        data_tests:
          - unique
          - not_null
      - name: platform
        data_tests:
          - not_null
  - name: fact_movie_scores
    columns:
      - name: movie_id
        data_tests:
          - unique
          - not_null
      - name: flickmetrix_score
        data_tests:
          - not_null
      - name: imdb_score
        data_tests:
          - not_null
      - name: imdb_votes
        data_tests:
          - not_null
      - name: metacritic_score
        description: "Nullable — not all movies are listed on Metacritic."
      - name: rt_critic_score
        description: "Nullable — not all movies are listed on Rotten Tomatoes."
      - name: critic_reviews_count
        description: "The number of critic reviews for the movie. Nullable — not all movies have this data recorded."
      - name: audience_score
        description: "The audience score of the movie on Rotten Tomatoes. Nullable — not all movies are listed on Rotten Tomatoes."
      - name: audience_reviews_count
        description: "The number of audience reviews for the movie. Nullable — not all movies have this data recorded."
      - name: letterboxd_score
        description: "The score of the movie on Letterboxd. Nullable — not all movies are listed on Letterboxd."
      - name: google_score 
        description: "Nullable — not available for all movies."
      - name: title
        data_tests:
          - not_null
      - name: release_year
        data_tests:
          - not_null
      - name: director
        data_tests:
          - not_null
      - name: language
        data_tests:
          - not_null
      - name: avg_combined_score
        description: "The average of the critic and audience scores on Rotten Tomatoes. Nullable — calculated only for movies that have both scores available."
        
  